<body>

<h2>Ringkasan AI</h2>

<div class="toolbar">

  <!-- TEXT STYLE -->
  <button onclick="formatText('bold')">B</button>
  <button onclick="formatText('italic')">I</button>
  <button onclick="formatText('underline')">U</button>

  <!-- ALIGN -->
  <button onclick="formatText('justifyLeft')">⬅</button>
  <button onclick="formatText('justifyCenter')">⬇</button>
  <button onclick="formatText('justifyRight')">➡</button>

  <!-- LIST -->
  <button onclick="formatText('insertUnorderedList')">•</button>
  <button onclick="formatText('insertOrderedList')">1.</button>

  <!-- FONT -->
  <select onchange="changeFont(this.value)">
    <option value="">Font</option>
    <option value="Arial">Arial</option>
    <option value="Times New Roman">Times</option>
    <option value="Courier New">Mono</option>
  </select>

  <!-- SIZE -->
  <select onchange="changeFontSize(this.value)">
    <option value="3">Normal</option>
    <option value="5">Besar</option>
    <option value="6">Judul</option>
  </select>

  <!-- COLOR -->
  <input type="color" onchange="changeColor(this.value)">

  <!-- HIGHLIGHT -->
  <button onclick="highlightText()">🖍</button>

  <!-- CLEAR -->
  <button onclick="formatText('removeFormat')">🧹</button>

</div>

<button onclick="exportPDF()" class="pdf-btn">⬇️ Download PDF</button>

<div id="editor" class="editor" contenteditable="true"></div>

<!-- 🔥 TOOLBAR -->
<div class="toolbar">
  <select id="featureSelect">
    <option value="">Pilih Fitur</option>
    <option value="flashcard">Flashcard</option>
    <option value="quiz">Quiz</option>
  </select>

  <button onclick="runFeature()">Jalankan</button>
</div>

<!-- 🔥 OUTPUT -->
<div id="extraOutput"></div>

<script>

let quizCount = 0;
const MAX_QUIZ = 3;

// 🔥 LOAD SUMMARY
const summary = localStorage.getItem("summary");
document.getElementById("editor").innerHTML = summary;

console.log("ISI LOCALSTORAGE:", summary);

// 🔥 RUN FEATURE
async function runFeature(){
  let feature = document.getElementById("featureSelect").value;
  let output = document.getElementById("extraOutput");

  output.innerHTML = "Loading...";

 const text = localStorage.getItem("rawText");

  // 🔥 FLASHCARD
  if(feature === "flashcard"){

    const res = await fetch("/api/generate-flashcard", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text})
    });

    const data = await res.json();
    let cards = JSON.parse(data.flashcards);

    output.innerHTML = cards.map((c,i)=>`
      <div class="flashcard" onclick="flipCard(${i})">
        <div class="inner" id="card-${i}">
          <div class="front">${c.term}</div>
          <div class="back">${c.definition}</div>
        </div>
      </div>
    `).join("");
  }

  // 🔥 QUIZ
  if(feature === "quiz"){
    if(feature === "quiz"){
  quizCount = 0;
  generateQuiz(); // 🔥 langsung munculin quiz pertama
}

    const text = localStorage.getItem("rawText");

    const res = await fetch("/api/generate-quiz", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ text })
    });

    const data = await res.json();
    let quiz;

try {
  quiz = JSON.parse(data.quiz);
} catch (err) {
  console.error("JSON ERROR:", data.quiz);

  document.getElementById("extraOutput").innerHTML =
    "❌ Gagal generate quiz (format AI error)";
  return;
}
    renderQuiz(quiz);
  }
}

async function generateQuiz(){

  if(quizCount >= MAX_QUIZ){
    document.getElementById("extraOutput").innerHTML =
      "🎉 Kamu sudah menyelesaikan semua quiz!";
    return;
  }

  const text = localStorage.getItem("rawText");

  const res = await fetch("/api/generate-quiz", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  let quiz;

  try {
    quiz = JSON.parse(data.quiz);
  } catch (err) {
    console.error("JSON ERROR:", data.quiz);
    return;
  }

  quizCount++;

  renderQuiz(quiz);
}

// 🔥 FLIP
function flipCard(i){
  document.getElementById("card-"+i).classList.toggle("flip");
}

// 🔥 QUIZ CHECK

function formatText(command){
  document.execCommand(command, false, null);
}

function changeFont(font){
  document.execCommand("fontName", false, font);
}

function changeFontSize(size){
  document.execCommand("fontSize", false, size);
}

function changeColor(color){
  document.execCommand("foreColor", false, color);
}

function highlightText(){
  document.execCommand("hiliteColor", false, "yellow");
}

function renderQuiz(quiz){

  const output = document.getElementById("extraOutput");

  output.innerHTML = `
  <div class="quiz-card" id="quizCard">

    <h3>Quiz ${quizCount} / ${MAX_QUIZ}</h3>
    <h3>${quiz.question}</h3>
    
    ${quiz.options.map((opt, i)=>{
      const letter = ["A","B","C","D"][i];
      return `<div class="option" onclick="selectAnswer('${letter}', this)">
        ${letter}. ${opt}
      </div>`;
    }).join("")}

  </div>
  `;

  window.currentQuiz = quiz;
}

function selectAnswer(selected, el){

  const quiz = window.currentQuiz;
  const options = document.querySelectorAll(".option");

  // disable klik ulang
  options.forEach(opt => opt.style.pointerEvents="none");

  if(selected === quiz.answer){
    el.classList.add("correct");
  }else{
    el.classList.add("wrong");

    // tandain jawaban benar
    options.forEach(opt=>{
      if(opt.innerText.startsWith(quiz.answer)){
        opt.classList.add("correct");
      }
    });
  }

  setTimeout(()=>{
    showResult(selected === quiz.answer, quiz);
  }, 1200);
}

function showResult(isCorrect, quiz){

  const card = document.getElementById("quizCard");

  card.classList.add("fade-out");

  setTimeout(()=>{

    card.innerHTML = `
      <h2>${isCorrect ? "✅ Benar!" : "❌ Salah!"}</h2>

      <p style="margin:10px 0">${quiz.explanation}</p>

      ${
        quizCount < MAX_QUIZ
        ? `<button onclick="nextQuiz()">Next Quiz ➡️</button>`
        : `<button onclick="finishQuiz()">Selesai 🎉</button>`
      }

    `;

    card.classList.remove("fade-out");
    card.classList.add("fade-in");

  }, 400);
}

async function nextQuiz(){
  document.getElementById("quizCard").innerHTML = "⏳ Generating next quiz...";
  await generateQuiz();
}

function retryQuiz(){
  renderQuiz(window.currentQuiz);
}

function exportPDF(){
  window.print();
}

function finishQuiz(){
  document.getElementById("extraOutput").innerHTML =
    "🎉 Kamu sudah menyelesaikan semua quiz!";
}

</script>

</body>
</html>
